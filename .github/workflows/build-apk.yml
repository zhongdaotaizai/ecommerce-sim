name: Build APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install --no-audit --no-fund
      - run: npm install -g eas-cli
      - name: Init
        run: |
          set +e
          eas init --non-interactive --force 2>&1
          echo "EAS_INIT_DONE"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Build
        run: |
          set +e
          eas build --platform android --profile preview --non-interactive --wait 2>&1
          echo "EAS_BUILD_DONE"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ecommerce-sim-apk
          path: frontend/*.apk