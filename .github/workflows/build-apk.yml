name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: npm install --no-audit --no-fund

      - name: Generate Android project
        run: npx expo prebuild --platform android --non-interactive --no-install 2>&1

      - name: Fix AGP
        run: sed -i 's/com.android.tools.build:gradle:[0-9.]*"/com.android.tools.build:gradle:8.1.4"/g' android/build.gradle

      - name: Fix plugin
        run: sed -i 's/com.android.internal.application/com.android.application/g' app/build.gradle

      - name: Build APK
        working-directory: frontend/android
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          chmod +x gradlew
          ./gradlew assembleDebug 2>&1

      - name: Find and copy APK
        run: |
          find . -name "*.apk" -type f 2>/dev/null
          mkdir -p apk-output
          find . -name "*.apk" -type f -exec cp {} apk-output/ \; 2>/dev/null || true
          ls -la apk-output/ 2>/dev/null || echo "No APK found"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ecommerce-sim-apk
          path: frontend/apk-output/*.apk