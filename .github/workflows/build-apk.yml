name: Build APK
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: sed -i '1s/^\xEF\xBB\xBF//' *.json 2>/dev/null; echo done
      - run: npm install --no-audit --no-fund
      - run: npm install -g eas-cli
      - name: Init EAS
        run: npx --yes eas-cli init --non-interactive --force 2>&1 || true
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Build APK
        run: npx --yes eas-cli build --platform android --profile preview --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ecommerce-sim-apk
          path: frontend/*.apk
