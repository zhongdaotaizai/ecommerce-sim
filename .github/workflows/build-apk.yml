name: Debug
on: workflow_dispatch
jobs:
  debug:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install --no-audit --no-fund
      - name: Debug
        run: |
          echo '=== node ==='
          node --version
          echo '=== hex ==='
          xxd -l 5 app.json
          echo '=== config ==='
          npx --yes expo config --json 2>&1; echo 'EXIT:' $?
