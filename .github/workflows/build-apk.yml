name: Build APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install --no-audit --no-fund

      - name: Generate Android project
        run: npx expo prebuild --platform android --non-interactive --no-install 2>&1

      - name: Fix AGP version
        run: |
          sed -i 's/com.android.tools.build:gradle:[0-9.]*"/com.android.tools.build:gradle:8.1.4"/g' android/build.gradle
          echo "AGP version fixed to 8.1.4"
          grep "com.android.tools" android/build.gradle

      - name: Build APK
        working-directory: frontend/android
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          chmod +x gradlew
          ./gradlew assembleDebug 2>&1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ecommerce-sim-apk
          path: frontend/android/app/build/outputs/apk/debug/*.apk