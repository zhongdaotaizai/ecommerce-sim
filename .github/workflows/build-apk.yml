name: Build APK

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build APK with EAS
        run: npx eas-cli build --platform android --profile preview --non-interactive --wait

      - name: Get build artifact URL
        id: get_build
        run: |
          BUILD_JSON=$(npx eas-cli build:list --platform android --limit 1 --non-interactive --json)
          ARTIFACT_URL=$(echo "$BUILD_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['artifacts']['buildUrl'])" 2>/dev/null || echo "not_found")
          echo "artifact_url=$ARTIFACT_URL" >> $GITHUB_OUTPUT

      - name: Download APK
        if: steps.get_build.outputs.artifact_url != 'not_found'
        run: |
          curl -L -o app-release.apk "${{ steps.get_build.outputs.artifact_url }}"

      - name: Upload APK as artifact
        if: steps.get_build.outputs.artifact_url != 'not_found'
        uses: actions/upload-artifact@v4
        with:
          name: ecommerce-sim-apk
          path: frontend/app-release.apk
          retention-days: 30
