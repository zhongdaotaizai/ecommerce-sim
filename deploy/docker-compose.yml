version: "3.8"
services:
  mysql:
    image: mysql:8.0
    container_name: ecommerce-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecommerce_sim
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile
    container_name: ecommerce-backend
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: root
      DB_NAME: ecommerce_sim
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: "mysql+pymysql://root:root@mysql:3306/ecommerce_sim?charset=utf8mb4"
    volumes:
      - ../backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  celery_worker:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile
    container_name: ecommerce-celery
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: root
      DB_NAME: ecommerce_sim
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: "mysql+pymysql://root:root@mysql:3306/ecommerce_sim?charset=utf8mb4"
      CELERY_BROKER_URL: "redis://redis:6379/1"
      CELERY_RESULT_BACKEND: "redis://redis:6379/2"
    volumes:
      - ../backend:/app
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2
volumes:
  mysql_data:
